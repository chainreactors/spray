name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic:
    name: basic checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -count=1 -timeout 300s ./...

      - name: Test (race detector)
        if: runner.os == 'Linux'
        run: go test -race -short -count=1 -timeout 300s ./...

      - name: Vet
        run: go vet ./...

      - name: Build packages
        run: go build ./...
