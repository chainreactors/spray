version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
      chainreactors:
        patterns:
          - "github.com/chainreactors/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
